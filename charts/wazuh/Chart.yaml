apiVersion: v2
name: wazuh
description: Wazuh is a free and open source security platform that unifies XDR and SIEM protection for endpoints and cloud workloads.
type: application
appVersion: 5.0.0-beta1
version: 1.0.24
annotations:
  artifacthub.io/prerelease: "true"
  artifacthub.io/category: security
  artifacthub.io/changes: |
    - kind: changed
      description: "Update all components to Wazuh 5.0.0-beta1"
    - kind: changed
      description: "Replace Filebeat with native indexer-connector for event forwarding"
    - kind: changed
      description: "Update install path from /var/ossec to /var/wazuh-manager"
    - kind: changed
      description: "Remove agentless, mail and dbd daemon configs (removed in v5)"
    - kind: changed
      description: "Replace ossec-authd config with API-based agent enrollment"
    - kind: changed
      description: "Cluster is now always enabled (cluster.disabled option removed)"
  artifacthub.io/links: |
    - name: application source
      url: https://github.com/wazuh/wazuh
    - name: kustomize source
      url: https://github.com/wazuh/wazuh-kubernetes
  artifacthub.io/screenshots: |
    - title: Home Page
      url: https://morgoved.github.io/wazuh-helm/images/dashboard.png
    - title: Agent Deployment
      url: https://morgoved.github.io/wazuh-helm/images/agent-deploy.png
    - title: Threat Hunting
      url: https://morgoved.github.io/wazuh-helm/images/threat-hunting.png
