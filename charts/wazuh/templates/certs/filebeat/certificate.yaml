{{- if and .Values.certificates.enabled  .Values.wazuh.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "wazuh.fullname" . }}-indexer-connector
  namespace: {{ .Release.Namespace }}
spec:
  # Secret names are always required.
  secretName: indexer-connector-tls
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  duration: {{ .Values.certificates.duration }}
  renewBefore: {{ .Values.certificates.renewBefore }}
  isCA: false
  commonName: indexer-connector
  subject:
    organizations:
      - {{ .Values.certificates.subject.organization }}
    countries:
      - {{ .Values.certificates.subject.country }}
    localities:
      - {{ .Values.certificates.subject.locality }}
  # Issuer references are always required.
  issuerRef:
    name: {{ include "wazuh.fullname" . }}-ca-issuer
{{- end }}
